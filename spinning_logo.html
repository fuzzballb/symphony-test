<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuzzballbee Spinning Logo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .logo-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .orbit-ring {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #f5c842;
      border-right-color: #f5c84288;
      animation: spin 2s linear infinite;
    }

    .orbit-ring.ring2 {
      width: 170px;
      height: 170px;
      border-top-color: #ff6b35;
      border-right-color: #ff6b3588;
      animation: spin 3s linear infinite reverse;
    }

    .orbit-ring.ring3 {
      width: 140px;
      height: 140px;
      border-top-color: #7c4dff;
      border-right-color: #7c4dff88;
      animation: spin 1.5s linear infinite;
    }

    .bee-logo {
      position: relative;
      z-index: 10;
      width: 90px;
      height: 90px;
      animation: pulse 2s ease-in-out infinite;
    }

    .bee-body {
      width: 90px;
      height: 90px;
      background: radial-gradient(circle at 38% 38%, #ffe57a, #f5c842 60%, #c9a227);
      border-radius: 50% 50% 52% 48% / 45% 45% 55% 55%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 24px #f5c84266, 0 0 48px #f5c84222;
    }

    .bee-stripe {
      position: absolute;
      width: 100%;
      height: 18px;
      background: #1a1a1a;
      border-radius: 50%;
      opacity: 0.7;
    }

    .bee-stripe.s1 { top: 28px; transform: rotate(-5deg); }
    .bee-stripe.s2 { top: 48px; transform: rotate(-3deg); }

    .bee-eyes {
      position: absolute;
      top: 18px;
      display: flex;
      gap: 14px;
    }

    .bee-eye {
      width: 12px;
      height: 12px;
      background: #111;
      border-radius: 50%;
      position: relative;
    }

    .bee-eye::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
    }

    .bee-wings {
      position: absolute;
      top: -22px;
      display: flex;
      gap: 6px;
    }

    .wing {
      width: 38px;
      height: 28px;
      background: rgba(200, 230, 255, 0.35);
      border-radius: 60% 40% 40% 60% / 70% 30% 70% 30%;
      border: 1.5px solid rgba(200, 230, 255, 0.6);
      animation: flap 0.3s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }

    .wing.right {
      transform: scaleX(-1);
      animation-delay: 0.15s;
    }

    @keyframes flap {
      from { transform: rotateX(0deg) scaleY(1); }
      to   { transform: rotateX(40deg) scaleY(0.7); }
    }

    .wing.right {
      animation-name: flap-right;
    }

    @keyframes flap-right {
      from { transform: scaleX(-1) rotateX(0deg) scaleY(1); }
      to   { transform: scaleX(-1) rotateX(40deg) scaleY(0.7); }
    }

    .bee-stinger {
      position: absolute;
      bottom: -10px;
      width: 10px;
      height: 16px;
      background: linear-gradient(to bottom, #c9a227, #7a5c0a);
      border-radius: 0 0 50% 50%;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }

    .brand-text {
      text-align: center;
    }

    .brand-name {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, #f5c842, #ff6b35, #7c4dff, #f5c842);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    .brand-tagline {
      margin-top: 6px;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
    }

    @keyframes shimmer {
      to { background-position: -300% 0; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="logo-wrapper">
      <div class="orbit-ring"></div>
      <div class="orbit-ring ring2"></div>
      <div class="orbit-ring ring3"></div>

      <div class="bee-logo">
        <div class="bee-body">
          <div class="bee-stripe s1"></div>
          <div class="bee-stripe s2"></div>
          <div class="bee-eyes">
            <div class="bee-eye"></div>
            <div class="bee-eye"></div>
          </div>
          <div class="bee-wings">
            <div class="wing left"></div>
            <div class="wing right"></div>
          </div>
          <div class="bee-stinger"></div>
        </div>
      </div>
    </div>

    <div class="brand-text">
      <div class="brand-name">fuzzballbee</div>
      <div class="brand-tagline">spinning since forever</div>
    </div>
  </div>
</body>
</html>
